# Deploy automático al conectar este repo en Netlify (Git → GitHub).
#
# IMPORTANTE: "publish" es relativo al "base". Si en el panel pones Base = site
# y aquí publish = "site", Netlify publica site/site (vacío) y verás 404 en todo.
# Con base = "site" y publish = "." siempre se publica el contenido de /site.

[build]
  base = "site"
  publish = "."

# Invitaciones por URL directa (export Squarespace; no enlazadas en el menú del sitio estático).
[[redirects]]
  from = "/paolaykevin"
  to = "/paolaykevin.html"
  status = 200

[[redirects]]
  from = "/paolaykevin/"
  to = "/paolaykevin.html"
  status = 200

[[redirects]]
  from = "/ana-y-gonzalo"
  to = "/ana-y-gonzalo.html"
  status = 200

[[redirects]]
  from = "/ana-y-gonzalo/"
  to = "/ana-y-gonzalo.html"
  status = 200

# Alojamiento (Kevin y Paola): carpeta con index + assets del export Squarespace.
[[redirects]]
  from = "/paola-y-kevin-alojamiento"
  to = "/paola-y-kevin-alojamiento/"
  status = 301
